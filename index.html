<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>License Plate Detection System</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>

  <header class="header">
    <div>
      <h1>License Plate Detection System</h1>
      <p>AI-powered vehicle license plate detection using YOLO</p>
    </div>
  </header>

  <main class="container">

    <section class="control-panel">
      <h2>Input Source</h2>

      <div class="button-group">
        <label class="upload-btn">
          Upload Image
          <input type="file" id="imageUpload" accept="image/*" hidden>
        </label>

        <label class="upload-btn">
          Upload Video
          <input type="file" id="videoUpload" accept="video/*" hidden>
        </label>

        <button id="webcamBtn">Start Webcam</button>
        <button id="stopBtn" class="danger">Stop</button>
      </div>

      <div class="settings">
        <label>
          Confidence Threshold
          <input type="range" id="confSlider" min="0.1" max="0.9" step="0.05" value="0.35">
          <span id="confValue">0.35</span>
        </label>
      </div>

      <div class="status-box">
        <strong>Status:</strong>
        <span id="status">Loading model...</span>
      </div>
    </section>

    <section class="viewer">
      <div class="canvas-wrapper">
        <canvas id="canvas"></canvas>
      </div>

      <video id="video" autoplay muted playsinline hidden></video>
      <img id="image" hidden>
    </section>

    <section class="results">
      <h2>Detection Results</h2>
      <p>Total Plates Detected: <span id="count">0</span></p>
    </section>

  </main>

  <footer>
    <p>License Plate Detection System | YOLO ONNX Web Deployment</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
